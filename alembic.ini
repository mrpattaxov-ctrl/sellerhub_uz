# Minimal Alembic config for Uzum Seller Hub.
#
# The actual DB URL is read from the DATABASE_URL env var at runtime inside
# migrations/env.py — we deliberately do NOT put the URL here so credentials
# never land in source control.
#
# Existing tables are still managed by Base.metadata.create_all() during app
# boot; Alembic owns only the new Phase 1 sales/expenses tables until a
# follow-up cleanup migration brings everything under Alembic control.

[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os
# sqlalchemy.url is intentionally blank — env.py reads DATABASE_URL.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
