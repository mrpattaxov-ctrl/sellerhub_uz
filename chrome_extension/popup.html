<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Uzum Token Sync</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 300px;
      background: #0f172a;
      color: #e2e8f0;
      padding: 16px;
    }
    h2 {
      font-size: 15px;
      font-weight: 700;
      color: #7dd3fc;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h2 span.dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #64748b;
      display: inline-block;
    }
    h2 span.dot.ok   { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    h2 span.dot.err  { background: #ef4444; box-shadow: 0 0 6px #ef4444; }
    h2 span.dot.warn { background: #f59e0b; box-shadow: 0 0 6px #f59e0b; }

    label { font-size: 12px; color: #94a3b8; display: block; margin-bottom: 4px; }
    input[type="text"] {
      width: 100%;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 8px 10px;
      color: #e2e8f0;
      font-size: 13px;
      outline: none;
    }
    input[type="text"]:focus { border-color: #38bdf8; }
    input[type="text"].error { border-color: #ef4444; }

    .row { margin-top: 10px; }
    .btn {
      display: inline-block;
      padding: 7px 14px;
      border-radius: 6px;
      border: none;
      font-size: 13px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn-primary { background: #0ea5e9; color: #fff; }
    .btn-primary:hover { background: #38bdf8; }
    .btn-secondary { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
    .btn-secondary:hover { background: #334155; color: #e2e8f0; }

    .status-box {
      margin-top: 12px;
      background: #1e293b;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
      color: #94a3b8;
      line-height: 1.6;
    }
    .status-box .ok  { color: #22c55e; }
    .status-box .err { color: #ef4444; }
    .status-box .warn { color: #f59e0b; }

    .hint {
      margin-top: 12px;
      font-size: 11px;
      color: #475569;
      line-height: 1.5;
    }
    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h2><span class="dot" id="status-dot"></span> Uzum Token Sync</h2>

  <div class="row">
    <label>URL вашего приложения</label>
    <input type="text" id="app-url" placeholder="https://your-app.com или http://localhost:5000" />
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" id="btn-save">Сохранить</button>
    <button class="btn btn-secondary" id="btn-sync">Синхронизировать сейчас</button>
  </div>

  <div class="status-box" id="status-box">Загрузка...</div>

  <div class="hint">
    Расширение автоматически перехватывает токен каждый раз, когда вы открываете
    кабинет продавца Uzum, и обновляет его в вашем приложении без каких-либо
    ручных действий.
  </div>

  <script src="popup.js"></script>
</body>
</html>
