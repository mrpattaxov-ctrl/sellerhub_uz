services:
  db:
    image: postgres:16-alpine
    restart: always
    command: >
      postgres
      -c max_connections=500
      -c shared_buffers=512MB
      -c work_mem=4MB
      -c effective_cache_size=1536MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c synchronous_commit=off
    shm_size: "256mb"
    environment:
      POSTGRES_DB: uzum
      POSTGRES_USER: uzum
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-uzum_secret_change_me}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uzum"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G

  app:
    build: .
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      TZ: ${APP_TIMEZONE:-Asia/Tashkent}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Tashkent}
      APP_TZ_OFFSET_HOURS: ${APP_TZ_OFFSET_HOURS:-5}
      DATABASE_URL: postgresql+psycopg://uzum:${POSTGRES_PASSWORD:-uzum_secret_change_me}@db:5432/uzum
      FINANCE_AUTO_REFRESH_WORKERS: "100"
      FINANCE_AUTO_SYNC_WORKERS_PER_SHOP: "3"
      DB_POOL_SIZE: "80"
      DB_MAX_OVERFLOW: "150"
      ONBOARD_MAX_CONCURRENT_SYNCS: "20"
    volumes:
      - app_data:/app/data
    deploy:
      resources:
        limits:
          memory: 6G

volumes:
  pgdata:
  app_data:
