; =====================================================================
; PgBouncer config template for Uzum Seller Hub (Step 2-PRE).
;
; LOCAL-ONLY TEMPLATE. Do NOT run this file from the repo.
; Deploy procedure (see scripts/pgbouncer_deploy_checklist.md):
;   1. Replace <DB_HOST> / <DB_NAME> / <DB_USER> / <DB_PASS> placeholders.
;   2. Copy to /etc/pgbouncer/pgbouncer.ini on the VPS.
;   3. Create /etc/pgbouncer/userlist.txt with md5 hash for <DB_USER>.
;   4. systemctl enable --now pgbouncer
;   5. Flip app .env  ->  DB_PORT=6432, restart Gunicorn.
;
; Transaction pooling is used. Anything that relies on per-session state
; (prepared statements, SET timezone, LISTEN/NOTIFY, cross-txn temp
; tables, FOR UPDATE outside a transaction) will break silently. The app
; audit done in Step 2-PRE confirmed zero such hits; prepare_threshold is
; disabled in extensions.py via a SQLAlchemy connect-event listener.
; =====================================================================

[databases]
; Logical DB name -> real Postgres connection string.
; Keep the logical name equal to the real db name so the app's DATABASE_URL
; only has to swap the port (5432 -> 6432).
<DB_NAME> = host=<DB_HOST> port=5432 dbname=<DB_NAME> user=<DB_USER> password=<DB_PASS>

[pgbouncer]
; ── Listening ────────────────────────────────────────────────────────
listen_addr = 127.0.0.1
listen_port = 6432

; ── Pooling ──────────────────────────────────────────────────────────
pool_mode = transaction
default_pool_size = 25
max_client_conn = 2000
reserve_pool_size = 5
reserve_pool_timeout = 3
server_idle_timeout = 600
server_lifetime = 3600

; ── Auth ─────────────────────────────────────────────────────────────
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
auth_user = <DB_USER>

; ── Hygiene for txn-mode ─────────────────────────────────────────────
; DISCARD ALL wipes any session state that leaked (temp tables, GUCs,
; plan cache, listen channels) before the connection goes back to the pool.
server_reset_query = DISCARD ALL
; SQLAlchemy/psycopg3 send extra_float_digits at startup; PgBouncer
; ignores it safely instead of rejecting the client.
ignore_startup_parameters = extra_float_digits

; ── Logging ──────────────────────────────────────────────────────────
logfile = /var/log/pgbouncer/pgbouncer.log
pidfile = /var/run/pgbouncer/pgbouncer.pid
admin_users = <DB_USER>
stats_users = <DB_USER>
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
