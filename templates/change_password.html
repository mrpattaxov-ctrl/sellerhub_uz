{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-7 col-lg-5">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <h1 class="h4 fw-semibold mb-2">{{ t.pwd_title }}</h1>
        <p class="text-muted mb-4">{{ t.pwd_title }}</p>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="alert alert-warning">{{ messages[0] }}</div>
          {% endif %}
        {% endwith %}

        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-medium" for="current_password">{{ t.pwd_current }}</label>
            <input id="current_password" class="form-control" type="password" name="current_password" autocomplete="current-password" required>
          </div>

          <div class="mb-3">
            <label class="form-label fw-medium" for="new_password">{{ t.pwd_new }}</label>
            <input id="new_password" class="form-control" type="password" name="new_password" autocomplete="new-password" required>
          </div>

          <div class="mb-4">
            <label class="form-label fw-medium" for="confirm_password">{{ t.pwd_confirm }}</label>
            <input id="confirm_password" class="form-control" type="password" name="confirm_password" autocomplete="new-password" required>
          </div>

          <div class="d-flex gap-2">
            <button class="btn btn-primary" type="submit">{{ t.pwd_save }}</button>
            <a class="btn btn-outline-danger" href="/logout">{{ t.nav_logout }}</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
