<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Юнит Экономика</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" rel="stylesheet">
  <style>
    body { background-color:#F9FAFB; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif; color:#101828; }

    /* ── Cards ── */
    .card-stat {
      position:relative;
      background:#fff; border:1px solid #EAECF0;
      box-shadow:0 1px 2px rgba(16,24,40,.05);
      border-radius:12px; padding:20px; height:100%;
      transition:transform .2s, box-shadow .2s;
    }
    .card-stat:hover { transform:translateY(-2px); box-shadow:0 4px 6px -2px rgba(16,24,40,.05),0 12px 16px -4px rgba(16,24,40,.1); }
    .stat-label { font-size:13px; font-weight:500; color:#667085; margin-bottom:6px; display:flex; align-items:center; gap:6px; }
    .stat-icon  { font-size:16px; }
    .stat-val   { font-size:22px; font-weight:700; color:#101828; letter-spacing:-.02em; margin-top:2px; }
    .stat-head { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; margin-bottom:8px; }
    .stat-copy { min-width:0; }
    .stat-copy .stat-label { margin-bottom:2px; }
    .stat-subtitle { font-size:11px; font-weight:600; color:#98A2B3; letter-spacing:.02em; }
    .info-wrap { position:relative; flex-shrink:0; }
    .info-btn {
      width:24px; height:24px; border-radius:999px;
      border:1px solid #D0D5DD; background:#fff; color:#667085;
      display:inline-flex; align-items:center; justify-content:center;
      font-size:12px; font-weight:700; cursor:pointer;
      transition:border-color .2s, color .2s, background .2s;
      padding:0;
    }
    .info-btn:hover,
    .info-btn:focus-visible {
      border-color:#98A2B3; color:#101828; background:#F9FAFB; outline:none;
    }
    .info-popover {
      position:absolute; top:calc(100% + 8px); right:0; width:240px;
      background:#101828; color:#fff; border-radius:10px; padding:10px 12px;
      font-size:12px; line-height:1.45; box-shadow:0 12px 24px rgba(16,24,40,.18);
      display:none; z-index:20; text-align:left;
    }
    .info-popover::before {
      content:""; position:absolute; top:-6px; right:8px;
      border-left:6px solid transparent; border-right:6px solid transparent;
      border-bottom:6px solid #101828;
    }
    .info-wrap.open .info-popover { display:block; }

    /* ── Table ── */
    .table-card { background:#fff; border:1px solid #EAECF0; box-shadow:0 1px 2px rgba(16,24,40,.05); border-radius:12px; overflow:hidden; }
    .table thead th { background:#F9FAFB; color:#667085; font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.04em; padding:12px 20px; border-bottom:1px solid #EAECF0; white-space:nowrap; }
    .table tbody td { padding:14px 20px; vertical-align:middle; color:#101828; font-size:13px; border-bottom:1px solid #EAECF0; }
    .table tbody tr:last-child td { border-bottom:none; }
    .table tbody tr { transition:background .15s; }
    .table tbody tr:hover { background:#F9FAFB; }
    .table-img { width:44px; height:58px; object-fit:cover; border-radius:8px; border:1px solid #EAECF0; }
    .text-success-custom { color:#027A48; }
    .badge-roi { padding:3px 10px; border-radius:99px; font-weight:600; font-size:12px; display:inline-flex; align-items:center; }
    .badge-roi.positive { background:#ECFDF3; color:#027A48; }
    .badge-roi.neutral  { background:#F2F4F7; color:#344054; }
    .badge-roi.negative { background:#FEF3F2; color:#B42318; }

    /* ── Skeleton shimmer ── */
    @keyframes shimmer {
      0%   { background-position: -600px 0; }
      100% { background-position:  600px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, #EAECF0 25%, #F2F4F7 50%, #EAECF0 75%);
      background-size: 600px 100%;
      animation: shimmer 1.4s infinite linear;
      border-radius: 6px;
    }
    .skel-label { height:12px; width:55%; margin-bottom:10px; }
    .skel-val   { height:28px; width:80%; }
    .skel-img   { width:44px; height:58px; border-radius:8px; flex-shrink:0; }
    .skel-text  { height:13px; border-radius:4px; }
    .skel-cell  { height:13px; border-radius:4px; width:70%; margin-left:auto; }

    /* ── Status bar ── */
    #statusBar {
      display:none; align-items:center; gap:10px;
      background:#EFF8FF; border:1px solid #B2DDFF;
      border-radius:10px; padding:10px 16px;
      font-size:13px; color:#175CD3; margin-bottom:16px;
    }
    #statusBar.show { display:flex; }
    #statusBar.error { background:#FEF3F2; border-color:#FECDCA; color:#B42318; }
    .pulse-dot {
      width:8px; height:8px; border-radius:50%; background:currentColor;
      animation:pulse-dot 1s infinite;
      flex-shrink:0;
    }
    @keyframes pulse-dot {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:.4; transform:scale(.7); }
    }

    /* ── Fade-in ── */
    .fade-in { animation: fadeIn .35s ease both; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

    /* ── Apply button loading state ── */
    .btn-loading { pointer-events:none; opacity:.7; }

    /* ── Flatpickr overrides ── */
    .date-range-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      background: #fff;
      border: 1.5px solid #D0D5DD;
      border-radius: 10px;
      padding: 0 12px;
      gap: 8px;
      height: 34px;
      cursor: pointer;
      transition: border-color .2s, box-shadow .2s;
      min-width: 220px;
    }
    .date-range-wrapper:hover  { border-color: #667085; }
    .date-range-wrapper:focus-within { border-color: #2E90FA; box-shadow: 0 0 0 3px rgba(46,144,250,.15); }
    .date-range-wrapper .cal-icon { color: #667085; font-size: 15px; flex-shrink:0; }
    .date-range-wrapper input {
      border: none; outline: none; background: transparent;
      font-size: 12px; font-weight: 500; color: #101828;
      cursor: pointer; width: 100%;
    }
    .date-range-wrapper .arrow { color: #98A2B3; font-size:10px; flex-shrink:0; }

    .date-range-wrapper .flatpickr-calendar {
      position: absolute !important;
      top: calc(100% + 6px) !important;
      left: 0 !important;
      right: auto !important;
    }
    .flatpickr-calendar {
      border-radius: 12px !important;
      box-shadow: 0 8px 24px rgba(16,24,40,.12) !important;
      border: 1px solid #EAECF0 !important;
      font-family: inherit !important;
      font-size: 12px !important;
    }
    .flatpickr-months { padding: 4px 0 2px; }
    .flatpickr-month  { color: #101828 !important; height: 28px !important; }
    .flatpickr-current-month .flatpickr-monthDropdown-months,
    .flatpickr-current-month input.cur-year {
      font-weight: 600 !important; font-size: 12px !important; color: #101828 !important;
    }
    .flatpickr-prev-month, .flatpickr-next-month { padding: 4px 8px !important; }
    .flatpickr-prev-month svg, .flatpickr-next-month svg { width: 12px !important; height: 12px !important; fill: #667085 !important; }
    .flatpickr-prev-month:hover svg, .flatpickr-next-month:hover svg { fill: #101828 !important; }
    .flatpickr-weekday { color: #667085 !important; font-weight: 600 !important; font-size: 10px !important; }
    .flatpickr-day { border-radius: 6px !important; font-size: 11px !important; color: #344054; height: 30px !important; line-height: 30px !important; }
    .flatpickr-day:hover { background: #F2F4F7 !important; border-color: #F2F4F7 !important; }
    .flatpickr-day.today { border-color: #D0D5DD !important; font-weight: 600; }
    .flatpickr-day.selected,
    .flatpickr-day.startRange,
    .flatpickr-day.endRange {
      background: #2E90FA !important;
      border-color: #2E90FA !important;
      color: #fff !important;
      font-weight: 600;
    }
    .flatpickr-day.inRange {
      background: #EFF8FF !important;
      border-color: #EFF8FF !important;
      color: #175CD3 !important;
      border-radius: 0 !important;
      box-shadow: -5px 0 0 #EFF8FF, 5px 0 0 #EFF8FF !important;
    }
    .flatpickr-day.startRange { border-radius: 6px 0 0 6px !important; }
    .flatpickr-day.endRange   { border-radius: 0 6px 6px 0 !important; }
    .flatpickr-day.startRange.endRange { border-radius: 6px !important; }
    .flatpickr-day.disabled { color: #D0D5DD !important; }
    .flatpickr-innerContainer { padding: 0 6px 6px; }
  </style>
</head>

  <script>
    const CACHE_KEY_PREFIX = "eco_cache_";

    function cacheKey(df, dt) { return CACHE_KEY_PREFIX + df + "_" + dt; }

    function saveCache(df, dt, payload) {
      try {
        localStorage.setItem(cacheKey(df, dt), JSON.stringify({ payload, ts: Date.now() }));
      } catch(e) {}
    }

    function loadCache(df, dt) {
      try {
        const raw = localStorage.getItem(cacheKey(df, dt));
        return raw ? JSON.parse(raw) : null;
      } catch(e) { return null; }
    }

    function fmt(n) { return Math.round(n).toLocaleString("ru-RU"); }

    function roiBadge(roi) {
      const r = Math.round(roi);
      if (roi > 0) return `<span class="badge-roi positive">+${r}%</span>`;
      if (roi < 0) return `<span class="badge-roi negative">${r}%</span>`;
      return `<span class="badge-roi neutral">0%</span>`;
    }
    function profitColor(v) { return v >= 0 ? "#027A48" : "#B42318"; }
    function sign(v)        { return v > 0 ? "+" : ""; }

    function thisMonthDates() {
      const now = new Date();
      const y = now.getFullYear(), m = String(now.getMonth()+1).padStart(2,"0");
      return { from:`${y}-${m}-01`, to:`${y}-${m}-${String(now.getDate()).padStart(2,"0")}` };
    }

    function toISO(d) {
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    }

    function setStatus(msg, isError=false) {
      const bar = document.getElementById("statusBar");
      bar.className = "show" + (isError ? " error" : "");
      document.getElementById("statusText").textContent = msg;
    }
    function hideStatus() { document.getElementById("statusBar").className = ""; }

    function showCacheBar(ts) {
      const d = new Date(ts);
      const timeStr = d.toLocaleString("ru-RU", { day:"2-digit", month:"short", hour:"2-digit", minute:"2-digit" });
      document.getElementById("cacheTime").textContent = timeStr;
      document.getElementById("cacheBar").style.display = "flex";
    }
    function hideCacheBar() { document.getElementById("cacheBar").style.display = "none"; }

    function showSkeletonCards() {
      document.getElementById("cardsRow").innerHTML = `
        <div class="col-12 col-md-6 col-xl-3"><div class="card-stat"><div class="skeleton skel-label"></div><div class="skeleton skel-val"></div></div></div>
        <div class="col-12 col-md-6 col-xl-3"><div class="card-stat"><div class="skeleton skel-label"></div><div class="skeleton skel-val"></div></div></div>
        <div class="col-12 col-md-6 col-xl-3"><div class="card-stat"><div class="skeleton skel-label"></div><div class="skeleton skel-val"></div></div></div>
        <div class="col-12 col-md-6 col-xl-3"><div class="card-stat"><div class="skeleton skel-label"></div><div class="skeleton skel-val"></div></div></div>`;
    }

    function closeInfoPopovers() {
      document.querySelectorAll(".info-wrap.open").forEach((wrap) => {
        wrap.classList.remove("open");
        const btn = wrap.querySelector(".info-btn");
        if (btn) btn.setAttribute("aria-expanded", "false");
      });
    }

    document.addEventListener("click", (e) => {
      const btn = e.target.closest(".info-btn");
      if (btn) {
        const wrap = btn.closest(".info-wrap");
        const shouldOpen = wrap && !wrap.classList.contains("open");
        closeInfoPopovers();
        if (wrap && shouldOpen) {
          wrap.classList.add("open");
          btn.setAttribute("aria-expanded", "true");
        }
        return;
      }
      if (!e.target.closest(".info-wrap")) closeInfoPopovers();
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeInfoPopovers();
    });

    function renderCards(totals) {
      const pc = profitColor(totals.sales_profit);
      document.getElementById("cardsRow").innerHTML = `
        <div class="col-12 col-md-6 col-xl-3 fade-in" style="animation-delay:.00s"><div class="card-stat">
          <div class="stat-head">
            <div class="stat-copy">
              <div class="stat-label"><span class="stat-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#667085" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></span>Себестоимость товаров</div>
              <div class="stat-subtitle">Uzum + Склад</div>
            </div>
            <div class="info-wrap">
              <button type="button" class="info-btn" aria-label="Пояснение к себестоимости товаров" aria-expanded="false">i</button>
              <div class="info-popover">Показывает общую себестоимость всех остатков: товары на складе Uzum + товары на вашем складе.</div>
            </div>
          </div>
          <div class="stat-val">${fmt(totals.stock_cost)} <span style="font-size:14px;font-weight:500;color:#667085;">сум</span></div>
        </div></div>
        <div class="col-12 col-md-6 col-xl-3 fade-in" style="animation-delay:.05s"><div class="card-stat">
          <div class="stat-label"><span class="stat-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#667085" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></span>Выручка</div>
          <div class="stat-val">${fmt(totals.sales_revenue)} <span style="font-size:14px;font-weight:500;color:#667085;">сум</span></div>
        </div></div>
        <div class="col-12 col-md-6 col-xl-3 fade-in" style="animation-delay:.10s"><div class="card-stat">
          <div class="stat-label"><span class="stat-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#667085" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg></span>Комиссия + Логистика</div>
          <div class="stat-val" style="color:#B42318;">${fmt(totals.sales_commission + totals.sales_logistics)} <span style="font-size:14px;font-weight:500;">сум</span></div>
        </div></div>
        <div class="col-12 col-md-6 col-xl-3 fade-in" style="animation-delay:.15s"><div class="card-stat">
          <div class="stat-label"><span class="stat-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#667085" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></span>Чистая прибыль</div>
          <div class="stat-val" style="color:${pc};">${sign(totals.sales_profit)}${fmt(totals.sales_profit)} <span style="font-size:14px;font-weight:500;">сум</span></div>
        </div></div>`;
    }

    function skeletonRow(widths) {
      const cells = widths.map((w,i) => `
        <div style="padding:16px 20px;display:flex;align-items:center;${i>0?'justify-content:flex-end;':'gap:12px;'}">
          ${i===0
            ? `<div class="skeleton skel-img"></div><div style="flex:1;"><div class="skeleton skel-text" style="width:${w}%;margin-bottom:6px;"></div><div class="skeleton skel-text" style="width:35%;"></div></div>`
            : `<div class="skeleton skel-cell" style="width:${w}px;${i===9?'border-radius:99px;':''}"></div>`}
        </div>`).join("");
      return `<tr class="skel-row"><td colspan="10" style="padding:0;"><div style="display:grid;grid-template-columns:32% repeat(9,1fr);">${cells}</div></td></tr>`;
    }

    function renderRows(items) {
      const tbody = document.getElementById("ecoTbody");
      if (!items.length) {
        tbody.innerHTML = `<tr><td colspan="10"><div class="text-center py-5">
          <div style="font-size:40px;margin-bottom:12px;">📊</div>
          <div style="font-size:15px;font-weight:600;color:#344054;">Нет данных за выбранный период</div>
          <div style="font-size:13px;color:#667085;margin-top:4px;margin-bottom:16px;">Возможно, в этот период не было продаж</div>
          <button onclick="fetchFresh(dateFromEl.value, dateToEl.value)" class="btn btn-outline-primary px-4">🔄 Загрузить данные</button>
        </div></td></tr>`;
        return;
      }
      tbody.innerHTML = items.map((item, i) => `
        <tr class="fade-in" style="animation-delay:${Math.min(i*.03,.3)}s">
          <td><div class="d-flex align-items-center gap-3" style="min-width:240px;">
            ${item.image_url
              ? `<img src="${item.image_url}" class="table-img" loading="lazy">`
              : `<div class="table-img d-flex align-items-center justify-content-center bg-light text-muted" style="font-size:10px;">No img</div>`}
            <div>
              <div style="font-weight:500;line-height:1.4;margin-bottom:2px;">${item.name}</div>
              <div style="font-size:11px;color:#667085;">ID: ${item.id}</div>
            </div>
          </div></td>
          <td class="text-end" style="font-weight:500;">${item.stock_qty}</td>
          <td class="text-end" style="color:#667085;">${fmt(item.stock_cost)}</td>
          <td class="text-end" style="font-weight:600;border-left:1px solid #EAECF0;">${item.sales_qty}</td>
          <td class="text-end" style="color:#667085;">${fmt(item.sales_revenue)}</td>
          <td class="text-end text-danger">${fmt(item.sales_commission)}</td>
          <td class="text-end text-danger">${fmt(item.sales_logistics)}</td>
          <td class="text-end" style="color:#667085;">${fmt(item.sales_cost)}</td>
          <td class="text-end" style="font-weight:700;color:${profitColor(item.sales_profit)};">${sign(item.sales_profit)}${fmt(item.sales_profit)}</td>
          <td class="text-end">${roiBadge(item.roi)}</td>
        </tr>`).join("");
    }

    function setBtnRefreshLoading(loading) {
      const btn = document.getElementById("btnApply");
      const txt = document.getElementById("btnApplyText");
      const sp  = document.getElementById("btnApplySpinner");
      btn.classList.toggle("btn-loading", loading);
      txt.textContent  = loading ? "Загрузка…" : "Показать";
      sp.style.display = loading ? "inline-block" : "none";
    }

    // Show cached data instantly — no API call
    function renderFromCache(df, dt) {
      const cached = loadCache(df, dt);
      if (cached) {
        document.getElementById("periodLabel").textContent = `${df} — ${dt}`;
        renderCards(cached.payload.totals);
        renderRows(cached.payload.items);
        showCacheBar(cached.ts);
        return true;
      }
      return false;
    }

    // Fetch fresh data from API and save to cache
    async function fetchFresh(df, dt) {
      setBtnRefreshLoading(true);
      hideCacheBar();
      setStatus(`Загружаем свежие данные из Uzum за ${df} — ${dt}…`);
      showSkeletonCards();
      document.getElementById("ecoTbody").innerHTML =
        skeletonRow([75,55,65,55,65,65,65,65,65,40]) +
        skeletonRow([60,55,65,55,65,65,65,65,65,40]) +
        skeletonRow([80,55,65,55,65,65,65,65,65,40]) +
        skeletonRow([65,55,65,55,65,65,65,65,65,40]) +
        skeletonRow([70,55,65,55,65,65,65,65,65,40]);
      try {
        const res = await fetch(`/api/economics/data?date_from=${df}&date_to=${dt}`);
        if (!res.ok) throw new Error(`Сервер вернул ${res.status}`);
        const payload = await res.json();
        saveCache(df, dt, payload);
        renderCards(payload.totals);
        renderRows(payload.items);
        showCacheBar(Date.now());
        hideStatus();
      } catch(e) {
        document.getElementById("cardsRow").innerHTML = "";
        document.getElementById("ecoTbody").innerHTML = `<tr><td colspan="10"><div class="text-center py-5">
          <div style="font-size:36px;margin-bottom:12px;">⚠️</div>
          <div style="font-size:15px;font-weight:600;color:#B42318;">Ошибка загрузки</div>
          <div style="font-size:13px;color:#667085;margin-top:4px;">${e.message}</div>
        </div></td></tr>`;
        setStatus("Не удалось загрузить данные: " + e.message, true);
      } finally {
        setBtnRefreshLoading(false);
      }
    }

    const dateFromEl = document.getElementById("dateFrom");
    const dateToEl   = document.getElementById("dateTo");

    // Always use browser's local date for defaults
    const { from: initFrom, to: initTo } = thisMonthDates();
    dateFromEl.value = initFrom;
    dateToEl.value   = initTo;

    const fp = flatpickr("#dateRangeInput", {
      mode: "range",
      locale: "ru",
      dateFormat: "d M Y",
      showMonths: 1,
      disableMobile: true,
      static: true,
      appendTo: document.getElementById("dateRangeWrapper"),
      onChange(selectedDates) {
        if (selectedDates.length === 2) {
          dateFromEl.value = toISO(selectedDates[0]);
          dateToEl.value   = toISO(selectedDates[1]);
        }
      },
    });
    // Set initial date using Date objects to avoid parsing issues with locale
    function parseLocal(iso) {
      const [y, m, d] = iso.split("-").map(Number);
      return new Date(y, m - 1, d);
    }
    fp.setDate([parseLocal(initFrom), parseLocal(initTo)], true);

    document.getElementById("dateRangeWrapper").addEventListener("click", () => fp.open());

    // "Показать" — always fetch fresh from API
    document.getElementById("btnApply").addEventListener("click", () => {
      if (!dateFromEl.value || !dateToEl.value) { fp.open(); return; }
      fetchFresh(dateFromEl.value, dateToEl.value);
    });

    document.getElementById("btnThisMonth").addEventListener("click", () => {
      const { from, to } = thisMonthDates();
      dateFromEl.value = from;
      dateToEl.value   = to;
      fp.setDate([parseLocal(from), parseLocal(to)], false);
      document.getElementById("periodLabel").textContent = `${from} — ${to}`;
      if (!renderFromCache(from, to)) fetchFresh(from, to);
    });

    // On page open: show cache instantly — no API call
    document.getElementById("periodLabel").textContent = `${initFrom} — ${initTo}`;
    if (!renderFromCache(initFrom, initTo)) {
      fetchFresh(initFrom, initTo); // first ever visit
    }
  </script>
</body>
</html>
