{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h4 id="pageTitle">Финансы</h4>
</div>

<!-- Filter section -->
<div class="card mb-4">
  <div class="card-body">
    <div class="row g-3 align-items-end">
      <div class="col-auto">
        <label class="form-label small" id="lblShop">Магазин</label>
        <select id="shopSelect" class="form-select form-select-sm">
          {% for shop in shops %}
          <option value="{{ shop.uzum_id }}">
            {{ shop.name or shop.uzum_id }}
          </option>
          {% endfor %}
        </select>
      </div>
      <div class="col-auto">
        <label class="form-label small" id="lblFrom">С</label>
        <input type="date" id="dateFrom" class="form-control form-control-sm">
      </div>
      <div class="col-auto">
        <label class="form-label small" id="lblTo">По</label>
        <input type="date" id="dateTo" class="form-control form-control-sm">
      </div>
      <div class="col-auto">
        <label class="form-label small" id="lblSearch">Поиск по SKU</label>
        <input type="text" id="skuFilter" class="form-control form-control-sm" placeholder="SKU...">
      </div>
      <div class="col-auto">
        <button class="btn btn-sm btn-primary" onclick="loadData()">
          <span id="applyBtnText">Применить</span>
        </button>
      </div>
      <div class="col-auto">
        <button class="btn btn-sm btn-success" id="btnExport" onclick="exportExcel()" disabled>
          <span id="exportBtnText">Скачать Excel</span>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Totals -->
<div id="totalsBox" class="row mb-3 g-2" style="display:none">
  <div class="col-auto"><span class="badge bg-primary" id="totAmount"></span></div>
  <div class="col-auto"><span class="badge bg-warning text-dark" id="totReturns"></span></div>
  <div class="col-auto"><span class="badge bg-success" id="totRevenue"></span></div>
  <div class="col-auto"><span class="badge bg-danger" id="totCommission"></span></div>
  <div class="col-auto"><span class="badge bg-info text-dark" id="totLogistics"></span></div>
  <div class="col-auto"><span class="badge bg-dark" id="totProfit"></span></div>
</div>

<!-- Data table -->
<div class="table-responsive" id="tableBox" style="display:none">
  <table class="table table-hover">
    <thead>
      <tr>
        <th>#</th>
        <th></th>
        <th id="thSku">SKU</th>
        <th id="thProduct">Товар</th>
        <th id="thAmount">Кол-во</th>
        <th id="thReturns">Возвраты</th>
        <th id="thRevenue">Выручка</th>
        <th id="thCommission">Комиссия</th>
        <th id="thLogistics">Логистика</th>
        <th id="thProfit">Прибыль</th>
        <th id="thCost">Себестоимость</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div id="loadingBox" class="text-center py-4" style="display:none">
  <div class="spinner-border text-primary" role="status"></div>
  <p class="mt-2 text-muted" id="loadingText">Загрузка...</p>
</div>

<script>
let currentLang = '{{ lang }}';
let lastData = null;

const L = {
  ru: {
    pageTitle: 'Финансы',
    shop: 'Магазин',
    from: 'С', to: 'По', search: 'Поиск по SKU', apply: 'Применить',
    export: 'Скачать Excel', sku: 'Артикул', product: 'Товар',
    amount: 'Кол-во', returns: 'Возвраты', revenue: 'Выручка',
    commission: 'Комиссия', logistics: 'Логистика', profit: 'Прибыль',
    cost: 'Себестоимость', loading: 'Загрузка...',
    orders: 'заказов',
  },
  uz: {
    pageTitle: 'Moliya',
    shop: "Do'kon",
    from: 'Dan', to: 'Gacha', search: "SKU bo'yicha qidirish", apply: "Qo'llash",
    export: 'Excel yuklab olish', sku: 'Artikul', product: 'Mahsulot',
    amount: 'Miqdori', returns: 'Qaytarishlar', revenue: 'Tushum',
    commission: 'Komissiya', logistics: 'Logistika', profit: 'Foyda',
    cost: 'Tannarx', loading: 'Yuklanmoqda...',
    orders: 'buyurtmalar',
  }
};

function t(key) { return (L[currentLang] || L.ru)[key] || key; }

function toggleLang() {
  currentLang = currentLang === 'ru' ? 'uz' : 'ru';
  document.getElementById('langBtn').textContent = currentLang === 'ru' ? 'UZ' : 'RU';
  applyLang();
  // Re-fetch data with new language so product titles update
  if (lastData) loadData();
}

function applyLang() {
  document.getElementById('pageTitle').textContent = t('pageTitle');
  document.getElementById('lblShop').textContent = t('shop');
  document.getElementById('lblFrom').textContent = t('from');
  document.getElementById('lblTo').textContent = t('to');
  document.getElementById('lblSearch').textContent = t('search');
  document.getElementById('applyBtnText').textContent = t('apply');
  document.getElementById('exportBtnText').textContent = t('export');
  document.getElementById('thSku').textContent = t('sku');
  document.getElementById('thProduct').textContent = t('product');
  document.getElementById('thAmount').textContent = t('amount');
  document.getElementById('thReturns').textContent = t('returns');
  document.getElementById('thRevenue').textContent = t('revenue');
  document.getElementById('thCommission').textContent = t('commission');
  document.getElementById('thLogistics').textContent = t('logistics');
  document.getElementById('thProfit').textContent = t('profit');
  document.getElementById('thCost').textContent = t('cost');
  document.getElementById('loadingText').textContent = t('loading');
}

function loadData() {
  const shopId = document.getElementById('shopSelect').value;
  const dateFrom = document.getElementById('dateFrom').value;
  const dateTo = document.getElementById('dateTo').value;
  const sku = document.getElementById('skuFilter').value;

  document.getElementById('loadingBox').style.display = '';
  document.getElementById('tableBox').style.display = 'none';
  document.getElementById('totalsBox').style.display = 'none';

  let url = '/api/finance/data?shop_id=' + shopId + '&lang=' + currentLang;
  if (dateFrom) url += '&date_from=' + dateFrom;
  if (dateTo) url += '&date_to=' + dateTo;
  if (sku) url += '&sku=' + encodeURIComponent(sku);

  fetch(url)
    .then(r => r.json())
    .then(data => {
      document.getElementById('loadingBox').style.display = 'none';
      lastData = data;
      renderTable(data);
      document.getElementById('btnExport').disabled = false;
    })
    .catch(e => {
      document.getElementById('loadingBox').style.display = 'none';
      alert('Error: ' + e);
    });
}

function fmt(n) {
  return Number(n || 0).toLocaleString();
}

function renderTable(data) {
  const tots = data.totals || {};
  document.getElementById('totAmount').textContent = t('amount') + ': ' + fmt(tots.amount);
  document.getElementById('totReturns').textContent = t('returns') + ': ' + fmt(tots.amount_returns);
  document.getElementById('totRevenue').textContent = t('revenue') + ': ' + fmt(tots.revenue);
  document.getElementById('totCommission').textContent = t('commission') + ': ' + fmt(tots.commission);
  document.getElementById('totLogistics').textContent = t('logistics') + ': ' + fmt(tots.logistics);
  document.getElementById('totProfit').textContent = t('profit') + ': ' + fmt(tots.profit);
  document.getElementById('totalsBox').style.display = '';

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  (data.items || []).forEach((item, i) => {
    const tr = document.createElement('tr');
    const img = item.image_url
      ? '<img src="' + esc(item.image_url) + '" width="32" height="32" style="border-radius:4px;object-fit:cover">'
      : '';
    tr.innerHTML = '<td>' + (i+1) + '</td>'
      + '<td>' + img + '</td>'
      + '<td><small>' + esc(item.sku) + '</small></td>'
      + '<td>' + esc(item.product_title) + '</td>'
      + '<td>' + fmt(item.amount) + '</td>'
      + '<td>' + fmt(item.amount_returns) + '</td>'
      + '<td>' + fmt(item.sell_price) + '</td>'
      + '<td>' + fmt(item.commission) + '</td>'
      + '<td>' + fmt(item.logistics_fee) + '</td>'
      + '<td><strong>' + fmt(item.seller_profit) + '</strong></td>'
      + '<td>' + fmt(item.purchase_price) + '</td>';
    tbody.appendChild(tr);
  });
  document.getElementById('tableBox').style.display = '';
}

function exportExcel() {
  if (!lastData) return;
  const form = document.createElement('form');
  form.method = 'POST';
  form.action = '/api/finance/export';
  const input = document.createElement('input');
  input.type = 'hidden';
  input.name = 'data';
  input.value = JSON.stringify({
    items: lastData.items,
    totals: lastData.totals,
    labels: lastData.labels || L[currentLang],
  });
  form.appendChild(input);
  document.body.appendChild(form);
  form.submit();
  document.body.removeChild(form);
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

// Init
document.addEventListener('DOMContentLoaded', function() {
  const today = new Date().toISOString().slice(0,10);
  const firstDay = today.slice(0,8) + '01';
  document.getElementById('dateFrom').value = firstDay;
  document.getElementById('dateTo').value = today;
  applyLang();
});
</script>
{% endblock %}
