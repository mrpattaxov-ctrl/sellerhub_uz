{% extends "base.html" %}
{% block content %}
<div class="row mb-4">
  <div class="col">
    <h4>{{ t.lost_title }}</h4>
    <p class="text-muted small">lost = invoiced - active - defected - sold</p>
  </div>
</div>

<div class="row mb-4">
  <div class="col-auto">
    <label class="form-label fw-semibold">{{ t.common_shop }}</label>
    <select id="shopSelect" class="form-select">
      {% for shop in shops %}
      <option value="{{ shop.uzum_id }}">{{ shop.name or shop.uzum_id }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-auto d-flex align-items-end">
    <button id="btnCalc" class="btn btn-dark" onclick="calculate()">{{ t.lost_calculate_btn }}</button>
  </div>
  <div class="col-auto d-flex align-items-end">
    <button id="btnExcel" class="btn btn-success" onclick="downloadExcel()" disabled>{{ t.lost_download_excel }}</button>
  </div>
</div>

<div id="statusBox" class="alert alert-info small" style="display:none"></div>
<div id="errorBox" class="alert alert-danger small" style="display:none"></div>

<div id="summaryBox" style="display:none" class="row mb-3">
  <div class="col-auto"><span class="badge bg-secondary" id="sumInvoices"></span></div>
  <div class="col-auto"><span class="badge bg-primary" id="sumInvoiced"></span></div>
  <div class="col-auto"><span class="badge bg-success" id="sumActive"></span></div>
  <div class="col-auto"><span class="badge bg-warning text-dark" id="sumDefected"></span></div>
  <div class="col-auto"><span class="badge bg-info text-dark" id="sumSold"></span></div>
  <div class="col-auto"><span class="badge bg-danger" id="sumLost"></span></div>
</div>

<div class="table-responsive" id="tableBox" style="display:none">
  <table class="table table-hover">
    <thead>
      <tr>
        <th>#</th>
        <th>SKU</th>
        <th>{{ t.lost_invoiced_col }}</th>
        <th>{{ t.lost_active_col }}</th>
        <th>{{ t.lost_defected_col }}</th>
        <th>{{ t.lost_sold_col }}</th>
        <th>{{ t.lost_lost_col }}</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
let lastData = null;
const _T = {
  loading: '{{ t.common_loading }}',
  calculate: '{{ t.lost_calculate_btn }}',
  invoices: '{{ t.inv_items }}:',
  invoiced: '{{ t.lost_invoiced_col }}:',
  active: '{{ t.lost_active_col }}:',
  defected: '{{ t.lost_defected_col }}:',
  sold: '{{ t.lost_sold_col }}:',
  lost: '{{ t.lost_lost_col }}:',
  warnings: '{{ t.common_error }}:',
  error: '{{ t.common_error }}:',
};

function status(msg) {
  const el = document.getElementById('statusBox');
  el.textContent = msg;
  el.style.display = msg ? '' : 'none';
}

function calculate() {
  const shopId = document.getElementById('shopSelect').value;
  if (!shopId) return;
  const btn = document.getElementById('btnCalc');
  btn.disabled = true;
  btn.textContent = _T.loading;
  document.getElementById('btnExcel').disabled = true;
  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('summaryBox').style.display = 'none';
  document.getElementById('tableBox').style.display = 'none';
  status(_T.loading);

  fetch('/api/lost-goods?shop_id=' + shopId + '&all=true')
    .then(r => r.json())
    .then(data => {
      btn.disabled = false;
      btn.textContent = _T.calculate;
      status('');
      lastData = data;

      if (data.error) {
        document.getElementById('errorBox').textContent = data.error;
        document.getElementById('errorBox').style.display = '';
        return;
      }

      if (data.errors && data.errors.length) {
        const el = document.getElementById('errorBox');
        el.textContent = _T.warnings + ' ' + data.errors.map(e => e.error || JSON.stringify(e)).join('; ');
        el.style.display = '';
      }

      const t = data.totals || {};
      document.getElementById('sumInvoices').textContent = _T.invoices + ' ' + (data.total_invoices || 0);
      document.getElementById('sumInvoiced').textContent = _T.invoiced + ' ' + (t.invoiced || 0);
      document.getElementById('sumActive').textContent = _T.active + ' ' + (t.active || 0);
      document.getElementById('sumDefected').textContent = _T.defected + ' ' + (t.defected || 0);
      document.getElementById('sumSold').textContent = _T.sold + ' ' + (t.sold || 0);
      document.getElementById('sumLost').textContent = _T.lost + ' ' + (t.lost || 0);
      document.getElementById('summaryBox').style.display = '';

      const tbody = document.getElementById('tbody');
      tbody.innerHTML = '';
      (data.items || []).forEach((item, i) => {
        const tr = document.createElement('tr');
        if (item.lost > 0) tr.classList.add('table-danger');
        else if (item.lost < 0) tr.classList.add('table-warning');
        tr.innerHTML = '<td>' + (i+1) + '</td>'
          + '<td>' + esc(item.sku) + '</td>'
          + '<td>' + item.invoiced + '</td>'
          + '<td>' + item.active + '</td>'
          + '<td>' + item.defected + '</td>'
          + '<td>' + item.sold + '</td>'
          + '<td><strong>' + item.lost + '</strong></td>';
        tbody.appendChild(tr);
      });
      document.getElementById('tableBox').style.display = '';
      document.getElementById('btnExcel').disabled = false;
    })
    .catch(err => {
      btn.disabled = false;
      btn.textContent = _T.calculate;
      status('');
      document.getElementById('errorBox').textContent = _T.error + ' ' + err;
      document.getElementById('errorBox').style.display = '';
    });
}

function downloadExcel() {
  if (!lastData) return;
  const shopId = document.getElementById('shopSelect').value;
  const form = document.createElement('form');
  form.method = 'POST';
  form.action = '/lost-goods/export?shop_id=' + shopId;
  const input = document.createElement('input');
  input.type = 'hidden';
  input.name = 'data';
  input.value = JSON.stringify(lastData);
  form.appendChild(input);
  document.body.appendChild(form);
  form.submit();
  document.body.removeChild(form);
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}
</script>
{% endblock %}
