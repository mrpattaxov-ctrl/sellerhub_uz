{% extends "base.html" %}
{% block extra_css %}
<link rel="stylesheet" href="/static/pos.css">
{% endblock %}

{% block content %}
<div class="pos-shell">
  <section class="pos-panel">
    <div class="pos-card pos-results-wrap">
      <div class="pos-toolbar">
        <label class="pos-search-bar flex-fill mb-0" for="posSearch">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.5-3.5"></path></svg>
          <input id="posSearch" type="text" placeholder="{{ t.pos_search_placeholder }}" autocomplete="off" autofocus>
        </label>
        <button class="pos-toolbar-btn" type="button" data-bs-toggle="modal" data-bs-target="#invoiceModal">{{ t.pos_invoices_btn }}</button>
      </div>

      <div id="posResults" class="pos-product-grid"></div>
    </div>
  </section>

  <aside class="pos-panel">
    <div class="pos-card pos-cart">
      <div class="pos-cart-header">
        <div class="pos-mode-toggle" role="radiogroup" aria-label="{{ t.pos_mode_label }}">
          <input type="radio" id="modeSale" name="posMode" value="sale" checked>
          <label for="modeSale">{{ t.pos_mode_sale_label }}</label>
          <input type="radio" id="modeStockIn" name="posMode" value="stock_in">
          <label for="modeStockIn">{{ t.pos_mode_stock_in }}</label>
        </div>

        <div class="pos-cart-title">
          <h5>{{ t.pos_cart }}</h5>
          <span id="cartCount" class="pos-count-badge">0</span>
        </div>
      </div>

      <div id="cartContainer" class="pos-cart-list"></div>

      <div class="pos-action-footer">
        <div class="pos-action-summary">
          <span>{{ t.pos_total_items }}</span>
          <strong id="totalQty">0</strong>
        </div>
        <button id="btnCheckout" class="pos-primary-btn" type="button" disabled>{{ t.pos_confirm_btn }}</button>
      </div>
    </div>

    <div class="pos-card pos-history-panel">
      <div class="pos-cart-title">
        <h5>{{ t.pos_history_title }}</h5>
      </div>
      <div id="posHistory" class="pos-history-list"></div>
    </div>
  </aside>
</div>

<div class="modal fade" id="invoiceModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content pos-modal">
      <div class="modal-header">
        <h5 class="modal-title">{{ t.pos_invoice_modal_title }}</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="{{ t.nav_close }}"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label" for="invoiceShopSelect">{{ t.common_shop }}</label>
          <select id="invoiceShopSelect" class="form-select"></select>
        </div>
        <div class="mb-0">
          <label class="form-label" for="invoiceIdInput">{{ t.pos_invoice_id_label }}</label>
          <input id="invoiceIdInput" class="form-control" placeholder="{{ t.pos_invoice_id_placeholder }}">
        </div>
      </div>
      <div class="modal-footer">
        <button id="btnFetchInvoice" type="button" class="btn btn-dark w-100">{{ t.pos_load_btn }}</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="/static/pos_shared.js"></script>
<script>
const _PT = {
  emptyCartTitle: {{ t.pos_empty_cart | tojson }},
  emptyCartText: {{ t.pos_empty_cart_text | tojson }},
  actionPendingText: {{ t.pos_processing | tojson }},
  sellBtn: {{ t.pos_sell_btn | tojson }},
  stockInBtn: {{ t.pos_stock_in_btn | tojson }},
  transactionError: {{ t.pos_transaction_error | tojson }},
  saleDone: {{ t.pos_sale_done | tojson }},
  receiptDone: {{ t.pos_receipt_done | tojson }},
  historyEmpty: {{ t.pos_history_empty | tojson }},
  historyUndoBtn: {{ t.pos_history_undo_btn | tojson }},
  historyRevertedBadge: {{ t.pos_history_reverted_badge | tojson }},
  historyConfirmUndo: {{ t.pos_history_confirm_undo | tojson }},
  historyUndoSuccess: {{ t.pos_history_undo_success | tojson }},
  historyUndoFailed: {{ t.pos_history_undo_failed | tojson }},
  actionSale: {{ t.pos_action_sale | tojson }},
  actionStockIn: {{ t.pos_action_stock_in | tojson }},
  historyUnits: {{ t.pos_history_units | tojson }},
  historySkuLabel: {{ t.pos_history_sku_label | tojson }},
};
new PosEngine({
  showStock: true,
  showModeToggle: true,
  actionBtnId: "btnCheckout",
  emptyCartTitle: _PT.emptyCartTitle,
  emptyCartText: _PT.emptyCartText,
  actionPendingText: _PT.actionPendingText,
  actionShortcut: "ctrl+enter",
  historyContainerId: "posHistory",
  historyEmptyText: _PT.historyEmpty,
  historyUndoBtnText: _PT.historyUndoBtn,
  historyRevertedBadgeText: _PT.historyRevertedBadge,
  historyConfirmUndoText: _PT.historyConfirmUndo,
  historyUndoSuccessText: _PT.historyUndoSuccess,
  historyUndoFailedText: _PT.historyUndoFailed,
  historyUnitsText: _PT.historyUnits,
  historySkuLabelText: _PT.historySkuLabel,
  historyLabels: { sale: _PT.actionSale, stock_in: _PT.actionStockIn },
  updateActionBtn: function (button, items, totalQty, mode) {
    button.className = "pos-primary-btn " + (mode === "sale" ? "pos-primary-btn--danger" : "pos-primary-btn--success");
    button.textContent = mode === "sale"
      ? _PT.sellBtn + " (" + totalQty + ")"
      : _PT.stockInBtn + " (" + totalQty + ")";
  },
  onAction: async function (items, mode) {
    const response = await fetch("/api/pos/transaction", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ mode: mode, items: items })
    });
    const data = await response.json();
    if (!response.ok || !data.ok) {
      throw new Error(data.error || _PT.transactionError);
    }
    return {
      message: mode === "sale" ? _PT.saleDone : _PT.receiptDone
    };
  }
});
</script>
{% endblock %}
